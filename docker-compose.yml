version: '3.8'

services:
  orchestrator-api:
    build:
      context: .
      dockerfile: src/LabOrchestrator.API/Dockerfile
    ports:
      - "5096:5096"
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts
    environment:
      - ASPNETCORE_URLS=http://+:5096
      - ASPNETCORE_ENVIRONMENT=Development